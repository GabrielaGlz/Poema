<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>
</head>
<body>
    

    <section class="spacer"></section>

    <section class="poem-section" id="poem-section">
        <div class="poem-wrapper">

            <h1 class="poem-title">Lagartija, iguana, lagarto</h1>
            <p>Jovani Vazquez</p>

            <!--Primer verso-->
            <div class="poem-line">
                <span class="poem-text">
                    largartija
                </span>
                <span class="poem-mask"></span>
            </div>

            <!--Segundo verso-->
             <div class="poem-line">
                <span class="poem-text">
                  iguana, lagarto
                </span>
                <span class="poem-mask"></span>
            </div>

            <!--Tercer verso-->
             <div class="poem-line">
                <span class="poem-text">
                   lagartija
                </span>
                <span class="poem-mask"></span>
            </div>

            <!--Cuarto verso-->
             <div class="poem-line">
                <span class="poem-text">
                   iguana
                </span>
                <span class="poem-mask"></span>
            </div>

            <!--Quinto verso-->
             <div class="poem-line">
                <span class="poem-text">
                  lagarto
                </span>
                <span class="poem-mask"></span>
            </div>

             <!--Sexto verso-->
             <div class="poem-line">
                <span class="poem-text">
                  me asomo a la ventana y veo una paloma
                </span>
                <span class="poem-mask"></span>
            </div>

        </div>
    </section>

    <section class="spacer"></section>

    <script src="script.js"></script>
   


</body>
</html>
